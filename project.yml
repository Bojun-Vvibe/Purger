name: Purger
options:
  bundleIdPrefix: com.bojun.purger
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Purger:
    type: application
    platform: macOS
    sources:
      - path: Purger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bojun.purger
        PRODUCT_NAME: Purger
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Bojun. All rights reserved."
        INFOPLIST_KEY_CFBundleDisplayName: Purger
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        ENABLE_PREVIEWS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: Purger/Resources/Purger.entitlements
        COMBINE_HIDPI_IMAGES: "YES"
    entitlements:
      path: Purger/Resources/Purger.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true
